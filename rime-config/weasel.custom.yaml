# 小狼毫（Weasel）前端设置补丁：界面外观 + 游戏兼容
patch:
  # ---------- 外观：简白圆润主题 ----------
  # 字体：幼圆（圆体）优先，缺失时退到微软雅黑 Light（轻盈）再到雅黑
  style/font_face: "幼圆, 微软雅黑 Light, 微软雅黑"
  style/font_point: 12
  style/horizontal: true          # 横排候选栏，类似微软拼音
  style/inline_preedit: true      # 编码嵌入光标处，体验接近系统输入法
  style/label_format: "%s"        # 序号不带点，更清爽

  # 关闭中英切换等状态提示（光标旁弹出的小图标/气泡）
  style/show_notifications: false
  style/show_notifications_time: 0

  # 布局：加大留白、圆角、柔和阴影，告别紧凑感
  style/layout/border_width: 0
  style/layout/round_corner: 10   # 高亮块圆角
  style/layout/corner_radius: 12  # 窗口圆角（新版小狼毫支持）
  style/layout/margin_x: 14
  style/layout/margin_y: 12
  style/layout/spacing: 12
  style/layout/candidate_spacing: 26
  style/layout/hilite_padding: 8
  style/layout/hilite_spacing: 6
  style/layout/shadow_radius: 10

  # 配色：白底、灰字、单一柔蓝高亮（Weasel 颜色为 0xBBGGRR）
  style/color_scheme: walter_light
  preset_color_schemes/walter_light:
    name: "简白圆润 / Walter Light"
    back_color: 0xFFFFFF                  # 纯白底
    border_color: 0xF0F0F0
    shadow_color: 0x20000000              # 极淡阴影
    text_color: 0x666666                  # 拼音编码：中灰
    hilited_text_color: 0x444444
    hilited_back_color: 0xFFFFFF
    label_color: 0xC8C8C8                 # 序号：浅灰，弱化
    candidate_text_color: 0x595959        # 候选词：柔和深灰
    comment_text_color: 0xB4B4B4
    hilited_candidate_back_color: 0xFCF1E4   # 首选背景：淡雾蓝 RGB(E4,F1,FC)
    hilited_candidate_text_color: 0xD97133   # 首选文字：柔蓝 RGB(33,71,D9)
    hilited_label_color: 0xE8B98C
    hilited_comment_text_color: 0xC8A878

  # ---------- 游戏兼容（核心） ----------
  # app_options：对指定进程自动切换行为。
  # ascii_mode: true  → 在该程序里启动时直接处于英文直通模式，
  #                     按键不经过中文引擎，零延迟、不弹候选框，
  #                     需要打中文时按左Shift临时切回即可。
  # inline_preedit: false → 部分全屏游戏内嵌编码会渲染异常，改用独立小窗。
  # 进程名一律小写。把你常玩的游戏 exe 名加进来即可。
  app_options:
    # --- 常见竞技/网游 ---
    cs2.exe: { ascii_mode: true }
    csgo.exe: { ascii_mode: true }
    valorant.exe: { ascii_mode: true }
    valorant-win64-shipping.exe: { ascii_mode: true }
    "league of legends.exe": { ascii_mode: true, inline_preedit: false }
    crossfire.exe: { ascii_mode: true }
    dota2.exe: { ascii_mode: true }
    r5apex.exe: { ascii_mode: true }            # Apex
    overwatch.exe: { ascii_mode: true }         # 守望先锋
    tslgame.exe: { ascii_mode: true }           # PUBG 绝地求生
    deltaforceclient-win64-shipping.exe: { ascii_mode: true }   # 三角洲行动
    marvelrivals_launcher.exe: { ascii_mode: true }
    marvel-rivals-win64-shipping.exe: { ascii_mode: true }      # 漫威争锋
    naraka.exe: { ascii_mode: true }            # 永劫无间
    # --- 米哈游系 ---
    yuanshen.exe: { ascii_mode: true, inline_preedit: false }   # 原神
    genshinimpact.exe: { ascii_mode: true, inline_preedit: false }  # 原神(国际服)
    starrail.exe: { ascii_mode: true, inline_preedit: false }   # 星穹铁道
    zenlesszonezero.exe: { ascii_mode: true, inline_preedit: false }  # 绝区零
    bh3.exe: { ascii_mode: true, inline_preedit: false }        # 崩坏3
    # --- 其他 ---
    wuthering waves.exe: { ascii_mode: true, inline_preedit: false }  # 鸣潮
    client-win64-shipping.exe: { ascii_mode: true, inline_preedit: false }  # 鸣潮(部分版本进程名)
    eldenring.exe: { ascii_mode: true }         # 艾尔登法环
    nightreign.exe: { ascii_mode: true }        # 艾尔登法环：黑夜君临
    gta5.exe: { ascii_mode: true }
    bf2042.exe: { ascii_mode: true }            # 战地2042
    # 终端/IDE 默认英文（可按需删除）
    windowsterminal.exe: { ascii_mode: true }
    openconsole.exe: { ascii_mode: true }

  # 新版小狼毫的通知开关在根级（build 里 style/ 下那份不生效）
  show_notifications: false
  show_notifications_time: 0
