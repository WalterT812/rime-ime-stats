# 小狼毫（Weasel）前端设置补丁：界面外观 + 游戏兼容
patch:
  # ---------- 外观：简白圆润主题 ----------
  # 字体：幼圆（圆体）优先，缺失时退到微软雅黑 Light（轻盈）再到雅黑
  style/font_face: "幼圆, 微软雅黑 Light, 微软雅黑"
  style/font_point: 14
  style/horizontal: true          # 横排候选栏，类似微软拼音
  style/inline_preedit: true      # 编码嵌入光标处，体验接近系统输入法
  style/label_format: "%s"        # 序号不带点，更清爽

  # 布局：加大留白、圆角、柔和阴影，告别紧凑感
  style/layout/border_width: 0
  style/layout/round_corner: 10   # 高亮块圆角
  style/layout/corner_radius: 12  # 窗口圆角（新版小狼毫支持）
  style/layout/margin_x: 14
  style/layout/margin_y: 12
  style/layout/spacing: 12
  style/layout/candidate_spacing: 26
  style/layout/hilite_padding: 8
  style/layout/hilite_spacing: 6
  style/layout/shadow_radius: 10

  # 配色：白底、灰字、单一柔蓝高亮（Weasel 颜色为 0xBBGGRR）
  style/color_scheme: walter_light
  preset_color_schemes/walter_light:
    name: "简白圆润 / Walter Light"
    back_color: 0xFFFFFF                  # 纯白底
    border_color: 0xF0F0F0
    shadow_color: 0x20000000              # 极淡阴影
    text_color: 0x666666                  # 拼音编码：中灰
    hilited_text_color: 0x444444
    hilited_back_color: 0xFFFFFF
    label_color: 0xC8C8C8                 # 序号：浅灰，弱化
    candidate_text_color: 0x595959        # 候选词：柔和深灰
    comment_text_color: 0xB4B4B4
    hilited_candidate_back_color: 0xFCF1E4   # 首选背景：淡雾蓝 RGB(E4,F1,FC)
    hilited_candidate_text_color: 0xD97133   # 首选文字：柔蓝 RGB(33,71,